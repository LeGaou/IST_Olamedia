<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OlaMedia | AI Discovery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.15);
        --glass-hover: rgba(255, 255, 255, 0.13);
        --accent-cyan: #00d4ff;
        --accent-purple: #7e22ce;
        --accent-light: #a855f7;
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.65);
        --text-muted: rgba(255, 255, 255, 0.4);
        --card-bg: rgba(255, 255, 255, 0.97);
        --card-text: #1a1a2e;
        --card-sub: #4a4a6a;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
        --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.2);
        --shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.35);
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(
          135deg,
          #0f2167 0%,
          #1e3a8a 40%,
          #6b21a8 80%,
          #7e22ce 100%
        );
        min-height: 100vh;
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 20px;
        font-family: "DM Sans", sans-serif;
        position: relative;
        overflow-x: hidden;
      }

      /* Subtle background noise/texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(126, 34, 206, 0.25) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(0, 212, 255, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 60% 80%,
            rgba(30, 58, 138, 0.3) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .glass-container {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 48px 44px;
        width: 100%;
        max-width: 960px;
        box-shadow:
          0 32px 64px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        text-align: center;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Header ── */
      .header {
        margin-bottom: 36px;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.4rem, 5vw, 3.4rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(
          135deg,
          #ffffff 30%,
          rgba(0, 212, 255, 0.85) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 0.95rem;
        font-weight: 300;
        color: var(--text-secondary);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      /* ── Nav Tabs ── */
      .nav-tabs {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 28px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 50px;
        padding: 5px;
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
      }

      .tab-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        padding: 9px 24px;
        border-radius: 50px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 0.88rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        transition: var(--transition);
      }

      .tab-btn:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.08);
      }

      .tab-btn.active {
        background: white;
        color: #1e3a8a;
        font-weight: 600;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      }

      /* ── Input Group ── */
      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 32px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      input {
        flex: 1;
        padding: 13px 18px;
        border-radius: var(--radius-md);
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        font-weight: 300;
        transition: var(--transition);
        outline: none;
        backdrop-filter: blur(8px);
      }

      input::placeholder {
        color: var(--text-muted);
      }

      input:focus {
        border-color: rgba(0, 212, 255, 0.5);
        background: rgba(255, 255, 255, 0.14);
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
      }

      .recommend-btn {
        padding: 13px 26px;
        border-radius: var(--radius-md);
        border: none;
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: #0a1628;
        font-family: "Syne", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: var(--transition);
        white-space: nowrap;
        box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3);
      }

      .recommend-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 212, 255, 0.45);
        background: linear-gradient(135deg, #1adcff 0%, #00bbee 100%);
      }

      .recommend-btn:active {
        transform: translateY(0);
      }

      /* ── Content Display ── */
      #content-display {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        margin-bottom: 40px;
        min-height: 60px;
      }

      /* ── Cards ── */
      .card {
        background: var(--card-bg);
        color: var(--card-text);
        padding: 22px 20px 18px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: var(--transition);
        border: 1px solid rgba(0, 0, 0, 0.04);
        cursor: default;
      }

      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: var(--shadow-hover);
      }

      .card h3 {
        font-family: "Syne", sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--card-text);
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      .card-genre {
        font-size: 0.75rem;
        font-weight: 400;
        color: #9b9bbb;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-top: -2px;
      }

      .card p {
        font-size: 0.85rem;
        color: var(--card-sub);
        line-height: 1.6;
        font-weight: 300;
        flex: 1;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
      }

      .card-rating {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: linear-gradient(135deg, #fef9c3, #fde68a);
        color: #92400e;
        font-family: "Syne", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 50px;
        letter-spacing: 0.02em;
      }

      .rate-btn {
        padding: 7px 14px;
        border: none;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, #7e22ce, #6b21a8);
        color: white;
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 2px 8px rgba(126, 34, 206, 0.3);
      }

      .rate-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(126, 34, 206, 0.5);
        background: linear-gradient(135deg, #9333ea, #7e22ce);
      }

      .rate-btn:active {
        transform: translateY(0);
      }

      /* ── Loading Spinner ── */
      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 48px 20px;
        grid-column: 1 / -1;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--accent-cyan);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-state p {
        font-size: 0.88rem;
        color: var(--text-secondary);
        font-weight: 300;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* ── Ratings Section ── */
      #ratings-section {
        margin-top: 8px;
        text-align: left;
        border-top: 1px solid var(--glass-border);
        padding-top: 28px;
      }

      #ratings-section h3 {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 16px;
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #ratings-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .rating-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--glass-border);
        padding: 12px 16px;
        border-radius: var(--radius-md);
        transition: var(--transition);
        font-size: 0.88rem;
        font-weight: 400;
        color: var(--text-secondary);
      }

      .rating-item:hover {
        background: var(--glass-hover);
        color: var(--text-primary);
      }

      .rating-item-info {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }

      .rating-type-badge {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent-cyan);
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.2);
        padding: 2px 8px;
        border-radius: 50px;
        white-space: nowrap;
      }

      .rating-score {
        font-family: "Syne", sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        color: #fbbf24;
        white-space: nowrap;
      }

      .delete-btn {
        margin-left: 14px;
        cursor: pointer;
        font-size: 0.8rem;
        opacity: 0.45;
        transition: var(--transition);
        padding: 4px 8px;
        border-radius: 6px;
        user-select: none;
        color: #ff6b6b;
        background: transparent;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .delete-btn:hover {
        opacity: 1;
        background: rgba(255, 107, 107, 0.12);
      }

      .empty-state {
        color: var(--text-muted);
        font-size: 0.88rem;
        font-style: italic;
        padding: 12px 0;
        font-weight: 300;
      }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .glass-container {
          padding: 32px 22px;
          border-radius: 20px;
        }

        #content-display {
          grid-template-columns: 1fr;
        }

        .input-group {
          flex-direction: column;
        }

        .recommend-btn {
          width: 100%;
        }

        .nav-tabs {
          width: 100%;
        }

        .tab-btn {
          flex: 1;
          padding: 9px 12px;
          font-size: 0.82rem;
          text-align: center;
        }

        .rating-item {
          flex-wrap: wrap;
          gap: 6px;
        }
      }
    </style>
  </head>

  <body>
    <div class="glass-container">
      <div class="header">
        <h1>OlaMedia</h1>
        <p class="subtitle">AI-Powered Media Discovery</p>
      </div>

      <div class="nav-tabs">
        <button class="tab-btn active" onclick="setCategory('movies')">
          Movies
        </button>
        <button class="tab-btn" onclick="setCategory('books')">Books</button>
        <button class="tab-btn" onclick="setCategory('music')">Music</button>
      </div>

      <div class="input-group">
        <input id="user-pref" placeholder="Sci-fi, Jazz, Romance…" />
        <button class="recommend-btn" onclick="getRecommendations()">
          Discover
        </button>
      </div>

      <div id="content-display"></div>

      <div id="ratings-section">
        <h3>⭐ Your Ratings</h3>
        <div id="ratings-list">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading ratings…</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://127.0.0.1:5000/api";
      let currentCategory = "movies";
      function getType(category) {
        return category === "music" ? "music" : category.slice(0, -1);
      }
      function setCategory(cat) {
        currentCategory = cat;

        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.innerText.toLowerCase() === cat);
        });

        loadMedia();
      }

      async function loadMedia() {
        const display = document.getElementById("content-display");
        display.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading ${currentCategory}…</p></div>`;

        const res = await fetch(`${API}/${currentCategory}`);
        const data = await res.json();

        display.innerHTML = "";

        data.forEach((item) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${item.name}</h3>
            ${item.genre ? `<p class="card-genre">${item.genre}</p>` : ""}
            <p>${item.description}</p>
            <div class="card-footer">
              <span class="card-rating">⭐ ${item.rating}/10</span>
              <button class="rate-btn" onclick="rate('${getType(currentCategory)}', ${item.id})">Rate</button>
            </div>
          `;

          display.appendChild(card);
        });
      }

      async function getRecommendations() {
        const pref = document.getElementById("user-pref").value;

        const display = document.getElementById("content-display");
        display.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Finding recommendations…</p></div>`;

        const res = await fetch(`${API}/recommend`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            preferences: pref,
            type: currentCategory.slice(0, -1),
          }),
        });

        const data = await res.json();

        display.innerHTML = "";

        data.data.split("\n").forEach((line) => {
          const [title, reason] = line.split(" - ");

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${title.replace(/^\d+\.\s*/, "")}</h3>
            <p>${reason}</p>
          `;

          display.appendChild(card);
        });
      }

      async function rate(type, id) {
        const score = prompt("Rating 0-10");
        if (!score) return;

        await fetch(`${API}/ratings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            media_type: type,
            media_id: id,
            score: score,
            user_id: "john",
          }),
        });

        loadRatings();
        loadMedia();
      }

      async function loadRatings() {
        const res = await fetch(`${API}/user_ratings?user_id=john`);
        const data = await res.json();

        const container = document.getElementById("ratings-list");

        if (!data.length) {
          container.innerHTML =
            '<p class="empty-state">No ratings yet — start exploring!</p>';
          return;
        }

        container.innerHTML = data
          .map(
            (r) => `
          <div class="rating-item">
            <div class="rating-item-info">
              <span class="rating-type-badge">${r.type}</span>
              <span>${r.name}</span>
            </div>
            <span class="rating-score">⭐ ${r.score}</span>
            <button class="delete-btn" onclick="deleteRating('${r.type}', ${r.media_id})" title="Remove rating">✕</button>
          </div>
        `,
          )
          .join("");
      }

      async function deleteRating(type, id) {
        await fetch(`${API}/ratings/${type}/${id}/john`, { method: "DELETE" });
        loadRatings();
        loadMedia();
      }

      window.onload = () => {
        loadMedia();
        loadRatings();
      };
    </script>
  </body>
</html>
